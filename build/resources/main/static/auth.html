<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Chatbox — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg:          #fdf6f0;
            --surface:     #ffffff;
            --border:      #f0d9e8;
            --accent:      #f472b6;
            --accent-glow: rgba(244,114,182,.2);
            --accent-dim:  #e879a7;
            --accent2:     #fbbf24;
            --green:       #34d399;
            --red:         #fb7185;
            --text:        #4a3050;
            --muted:       #b89ab5;
            --mono:        'DM Mono', monospace;
            --sans:        'Nunito', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -10%; left: -10%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(244,114,182,.18) 0%, transparent 65%);
            pointer-events: none;
            animation: blobDrift 12s ease-in-out infinite alternate;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -10%; right: -10%;
            width: 460px; height: 460px;
            background: radial-gradient(circle, rgba(251,191,36,.15) 0%, transparent 65%);
            pointer-events: none;
            animation: blobDrift 15s ease-in-out infinite alternate-reverse;
        }
        @keyframes blobDrift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(40px, 30px) scale(1.08); }
        }

        .card {
            position: relative;
            width: 100%;
            max-width: 440px;
            margin: 20px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
            z-index: 1;
            box-shadow: 0 20px 60px rgba(244,114,182,.12), 0 4px 20px rgba(0,0,0,.04);
            animation: slideUp .45s cubic-bezier(.16,1,.3,1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card::before {
            content: '';
            position: absolute;
            top: -1px; left: 20px; right: 20px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
            border-radius: 0 0 4px 4px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
        }
        .brand-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 14px var(--accent-glow);
        }
        .brand-name {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .tabs {
            display: flex;
            margin-bottom: 32px;
            border-bottom: 1.5px solid var(--border);
        }
        .tab {
            flex: 1;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px 0;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            color: var(--muted);
            position: relative;
            transition: color .2s;
        }
        .tab.active { color: var(--accent); }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1.5px; left: 0; right: 0;
            height: 2.5px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 2px;
        }

        .form-panel { display: none; }
        .form-panel.active { display: block; }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .field { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.7px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
            font-family: var(--mono);
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 11px 14px;
            font-family: var(--sans);
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        input::placeholder { color: var(--muted); font-size: 13px; }

        .btn {
            width: 100%;
            margin-top: 8px;
            padding: 13px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 14px;
            font-family: var(--sans);
            font-size: 15px;
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            transition: transform .1s, box-shadow .2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 18px var(--accent-glow);
        }
        .btn:hover { box-shadow: 0 6px 24px rgba(244,114,182,.4); transform: translateY(-1px); }
        .btn:active { transform: scale(0.99); }
        .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

        .notice {
            margin-top: 16px;
            padding: 11px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-family: var(--mono);
            display: none;
        }
        .notice.success { background: rgba(52,211,153,.12); border: 1.5px solid rgba(52,211,153,.3); color: #059669; display: block; }
        .notice.error   { background: rgba(251,113,133,.12); border: 1.5px solid rgba(251,113,133,.3); color: var(--red); display: block; }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            display: none;
        }
        .btn.loading .spinner { display: block; }
        .btn.loading .btn-text { opacity: 0.75; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hint {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: var(--muted);
        }
        .hint a { color: var(--accent); text-decoration: none; cursor: pointer; font-weight: 700; }
        .hint a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">
        <div class="brand-icon">🌸</div>
        <span class="brand-name">chatbox</span>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Sign In</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN -->
    <div class="form-panel active" id="panel-login">
        <div class="field">
            <label>Phone Number</label>
            <input id="l-number" type="tel" placeholder="e.g. +905001234567" autocomplete="username"/>
        </div>
        <div class="field">
            <label>Password</label>
            <input id="l-password" type="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <button class="btn" id="btn-login" onclick="doLogin()">
            <span class="btn-text">Sign In 🌸</span>
            <div class="spinner"></div>
        </button>
        <div class="notice" id="notice-login"></div>
        <p class="hint">No account? <a onclick="switchTab('register')">Create one</a></p>
    </div>

    <!-- REGISTER -->
    <div class="form-panel" id="panel-register">
        <div class="row">
            <div class="field">
                <label>First Name</label>
                <input id="r-firstname" type="text" placeholder="Beren"/>
            </div>
            <div class="field">
                <label>Last Name</label>
                <input id="r-lastname" type="text" placeholder="Saat"/>
            </div>
        </div>
        <div class="field">
            <label>Phone Number <span style="color:var(--red)">*</span></label>
            <input id="r-number" type="tel" placeholder="+905001234567" autocomplete="username"/>
        </div>
        <div class="field">
            <label>Password <span style="color:var(--red)">*</span></label>
            <input id="r-password" type="password" placeholder="min. 6 characters" autocomplete="new-password"/>
        </div>
        <button class="btn" id="btn-register" onclick="doRegister()">
            <span class="btn-text">Create Account ✨</span>
            <div class="spinner"></div>
        </button>
        <div class="notice" id="notice-register"></div>
        <p class="hint">Already have an account? <a onclick="switchTab('login')">Sign in</a></p>
    </div>
</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active', (i === 0) === (tab === 'login'));
        });
        document.getElementById('panel-login').classList.toggle('active', tab === 'login');
        document.getElementById('panel-register').classList.toggle('active', tab === 'register');
    }

    function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        btn.disabled = loading;
        btn.classList.toggle('loading', loading);
    }

    function showNotice(id, type, msg) {
        const el = document.getElementById(id);
        el.className = 'notice ' + type;
        el.textContent = msg;
    }

    function clearNotice(id) {
        const el = document.getElementById(id);
        el.className = 'notice';
        el.textContent = '';
    }

    async function doLogin() {
        clearNotice('notice-login');
        const number   = document.getElementById('l-number').value.trim();
        const password = document.getElementById('l-password').value;
        if (!number)   { showNotice('notice-login', 'error', 'Phone number is required.'); return; }
        if (!password) { showNotice('notice-login', 'error', 'Password is required.'); return; }
        setLoading('btn-login', true);
        try {
            const res  = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ number, password })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('chatbox_token', data.accessToken);
                showNotice('notice-login', 'success', '✓ Signed in! Redirecting…');
                setTimeout(() => window.location.href = 'chat.html', 900);
            } else {
                showNotice('notice-login', 'error', data?.error || 'Invalid credentials.');
            }
        } catch(e) {
            showNotice('notice-login', 'error', 'Network error. Is the server running?');
        } finally {
            setLoading('btn-login', false);
        }
    }

    async function doRegister() {
        clearNotice('notice-register');
        const firstname = document.getElementById('r-firstname').value.trim();
        const lastname  = document.getElementById('r-lastname').value.trim();
        const number    = document.getElementById('r-number').value.trim();
        const password  = document.getElementById('r-password').value;
        if (!number)   { showNotice('notice-register', 'error', 'Phone number is required.'); return; }
        if (!password) { showNotice('notice-register', 'error', 'Password is required.'); return; }
        setLoading('btn-register', true);
        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ firstname, lastname, number, password })
            });
            if (res.status === 201)      { showNotice('notice-register', 'success', '✓ Account created! Please sign in.'); setTimeout(() => switchTab('login'), 1200); }
            else if (res.status === 409) { showNotice('notice-register', 'error', 'This phone number is already registered.'); }
            else if (res.status === 400) { showNotice('notice-register', 'error', 'Please fill all required fields.'); }
            else                         { showNotice('notice-register', 'error', 'Registration failed. Try again.'); }
        } catch(e) {
            showNotice('notice-register', 'error', 'Network error. Is the server running?');
        } finally {
            setLoading('btn-register', false);
        }
    }

    document.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        document.getElementById('panel-login').classList.contains('active') ? doLogin() : doRegister();
    });

    if (localStorage.getItem('chatbox_token')) window.location.href = 'chat.html';
</script>
</body>
</html>
