<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Chatbox</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1a1a24;
            --border: #252530;
            --accent: #7c6af7;
            --accent-glow: rgba(124,106,247,0.2);
            --accent-dim: #5a4fd4;
            --green: #4ade80;
            --red: #f87171;
            --yellow: #fbbf24;
            --text: #e8e8f0;
            --muted: #6b6b80;
            --sans: 'Syne', sans-serif;
            --mono: 'DM Mono', monospace;
            --sidebar-w: 300px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .sidebar-header {
            padding: 20px 18px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand { display: flex; align-items: center; gap: 8px; }
        .brand-icon {
            width: 30px; height: 30px;
            background: var(--accent);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
        }
        .brand-name { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }

        .icon-btn {
            width: 32px; height: 32px;
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            transition: color .15s, border-color .15s, background .15s;
        }
        .icon-btn:hover { color: var(--text); border-color: var(--accent); background: var(--accent-glow); }

        .sidebar-search {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
        }

        .search-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 8px 12px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text);
            outline: none;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--muted); }

        .conv-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .conv-item {
            padding: 12px 16px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: background .15s, border-color .15s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .conv-item:hover { background: var(--surface2); }
        .conv-item.active { background: var(--surface2); border-left-color: var(--accent); }

        .conv-avatar {
            width: 40px; height: 40px; min-width: 40px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        .conv-info { flex: 1; min-width: 0; }
        .conv-title {
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .conv-meta {
            font-size: 11px;
            color: var(--muted);
            font-family: var(--mono);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }
        .badge {
            background: var(--accent);
            color: #fff;
            border-radius: 10px;
            padding: 1px 6px;
            font-size: 10px;
            font-weight: 700;
        }

        .sidebar-footer {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .me-avatar {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
        }
        .me-info { flex: 1; min-width: 0; }
        .me-name { font-size: 13px; font-weight: 700; }
        .me-number { font-size: 11px; color: var(--muted); font-family: var(--mono); }
        .online-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
        }

        /* ── Main ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: var(--muted);
        }
        .empty-state .big-icon { font-size: 64px; opacity: .4; }
        .empty-state p { font-size: 15px; }
        .empty-state small { font-family: var(--mono); font-size: 12px; }

        /* ── Chat Area ── */
        .chat-area { display: flex; flex-direction: column; height: 100%; }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface);
        }

        .chat-title { font-size: 16px; font-weight: 700; }
        .chat-subtitle { font-size: 11px; color: var(--muted); font-family: var(--mono); }
        .chat-header-right { margin-left: auto; display: flex; gap: 8px; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg-group { display: flex; flex-direction: column; gap: 3px; }

        .msg {
            max-width: 68%;
            padding: 10px 14px;
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            animation: msgIn .2s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-out {
            align-self: flex-end;
            background: var(--accent);
            color: #fff;
            border-radius: 4px 4px 2px 4px;
        }

        .msg-in {
            align-self: flex-start;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px 4px 4px 2px;
        }

        .msg-sender-name {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 2px;
            font-family: var(--mono);
        }

        .msg-meta {
            font-size: 10px;
            margin-top: 4px;
            opacity: .6;
            font-family: var(--mono);
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: flex-end;
        }

        .msg-in .msg-meta { justify-content: flex-start; }

        .status-icon { font-size: 12px; }

        .date-divider {
            text-align: center;
            font-size: 11px;
            color: var(--muted);
            font-family: var(--mono);
            padding: 8px 0;
            position: relative;
        }
        .date-divider::before, .date-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: var(--border);
        }
        .date-divider::before { left: 0; }
        .date-divider::after { right: 0; }

        /* ── Input Bar ── */
        .input-bar {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: var(--surface);
        }

        .input-wrap { flex: 1; position: relative; }

        textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px 14px;
            font-family: var(--sans);
            font-size: 14px;
            color: var(--text);
            outline: none;
            resize: none;
            max-height: 140px;
            min-height: 44px;
            line-height: 1.5;
            transition: border-color .2s, box-shadow .2s;
            display: block;
        }

        textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        textarea::placeholder { color: var(--muted); }

        .send-btn {
            width: 44px; height: 44px;
            background: var(--accent);
            border: none;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            transition: background .2s, box-shadow .2s, transform .1s;
            flex-shrink: 0;
        }
        .send-btn:hover { background: var(--accent-dim); box-shadow: 0 4px 14px var(--accent-glow); }
        .send-btn:active { transform: scale(0.95); }

        .ws-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-family: var(--mono);
            color: var(--muted);
        }
        .ws-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--muted);
            transition: background .3s;
        }
        .ws-dot.connected { background: var(--green); box-shadow: 0 0 5px var(--green); }
        .ws-dot.connecting { background: var(--yellow); animation: pulse 1s ease infinite; }
        .ws-dot.error { background: var(--red); }

        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

        /* ── Modal ── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            width: 100%;
            max-width: 420px;
            margin: 20px;
            animation: modalIn .2s cubic-bezier(.16,1,.3,1);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(.95); }
            to   { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .modal-title { font-size: 16px; font-weight: 700; }
        .modal-body { padding: 20px 24px; }
        .modal-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

        .modal label { display: block; font-size: 11px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; font-family: var(--mono); }
        .modal input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 9px 12px; font-family: var(--mono); font-size: 13px; color: var(--text); outline: none; }
        .modal input:focus { border-color: var(--accent); }
        .modal .field { margin-bottom: 14px; }

        .modal .hint-text { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 4px; }

        .btn-sm {
            padding: 8px 16px;
            border: none;
            border-radius: 3px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: background .2s;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-dim); }
        .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-ghost:hover { border-color: var(--accent); }

        /* ── Members panel ── */
        .members-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
        .member-row {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 10px; border-radius: 4px;
            background: var(--bg);
            border: 1px solid var(--border);
        }
        .member-avatar {
            width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; color: #fff;
        }
        .member-info { flex: 1; }
        .member-name { font-size: 13px; font-weight: 600; }
        .member-role { font-size: 10px; font-family: var(--mono); color: var(--muted); }
        .role-badge { padding: 2px 7px; border-radius: 3px; font-size: 10px; font-family: var(--mono); font-weight: 600; }
        .role-badge.admin { background: rgba(124,106,247,.2); color: var(--accent); }
        .role-badge.member { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

        .remove-btn {
            width: 26px; height: 26px; border-radius: 4px;
            background: none; border: 1px solid var(--border);
            color: var(--muted); cursor: pointer; font-size: 12px;
            display: flex; align-items: center; justify-content: center;
            transition: all .15s;
        }
        .remove-btn:hover { background: rgba(248,113,113,.15); border-color: var(--red); color: var(--red); }

        /* scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
    <div class="sidebar-header">
        <div class="brand">
            <div class="brand-icon">💬</div>
            <span class="brand-name">chatbox</span>
        </div>
        <button class="icon-btn" onclick="openNewConvModal()" title="New conversation">＋</button>
    </div>

    <div class="sidebar-search">
        <input class="search-input" type="text" id="search-input" placeholder="Search conversations…" oninput="filterConversations()"/>
    </div>

    <div class="conv-list" id="conv-list">
        <div style="padding:24px 16px; color:var(--muted); font-size:12px; font-family:var(--mono);">Loading…</div>
    </div>

    <div class="sidebar-footer">
        <div class="me-avatar" id="me-avatar">?</div>
        <div class="me-info">
            <div class="me-name" id="me-name">—</div>
            <div class="me-number" id="me-number">—</div>
        </div>
        <div class="online-dot" id="ws-dot-footer"></div>
        <button class="icon-btn" onclick="logout()" title="Sign out" style="margin-left:4px">⏏</button>
    </div>
</aside>

<!-- Main area -->
<main class="main" id="main">
    <div class="empty-state" id="empty-state">
        <div class="big-icon">💬</div>
        <p>Select a conversation</p>
        <small>or create a new one with ＋</small>
    </div>
</main>

<!-- ── New Conversation Modal ── -->
<div class="overlay" id="overlay-newconv">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">New Conversation</span>
            <button class="icon-btn" onclick="closeModal('overlay-newconv')">✕</button>
        </div>
        <div class="modal-body">
            <div class="field">
                <label>Title (optional)</label>
                <input id="nc-title" type="text" placeholder="Group name…"/>
            </div>
            <div class="field">
                <label>Type</label>
                <select id="nc-isGroup" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:9px 12px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;">
                    <option value="false">Direct (1-on-1)</option>
                    <option value="true">Group</option>
                </select>
            </div>
            <div class="field">
                <label>Member User IDs</label>
                <input id="nc-members" type="text" placeholder="e.g. 2,3,4"/>
                <p class="hint-text">Comma-separated IDs of users to add (you are included automatically)</p>
            </div>
            <div class="notice" id="nc-notice" style="margin-top:8px;font-family:var(--mono);font-size:12px;padding:8px 12px;border-radius:3px;display:none"></div>
        </div>
        <div class="modal-footer">
            <button class="btn-sm btn-ghost" onclick="closeModal('overlay-newconv')">Cancel</button>
            <button class="btn-sm btn-primary" onclick="createConversation()">Create</button>
        </div>
    </div>
</div>

<!-- ── Members Modal ── -->
<div class="overlay" id="overlay-members">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Members</span>
            <button class="icon-btn" onclick="closeModal('overlay-members')">✕</button>
        </div>
        <div class="modal-body">
            <div class="members-list" id="members-list"></div>
            <hr style="border:none;border-top:1px solid var(--border);margin:16px 0"/>
            <div class="field">
                <label>Add Members (User IDs)</label>
                <input id="add-member-ids" type="text" placeholder="e.g. 5,6"/>
            </div>
            <div class="notice" id="members-notice" style="margin-top:8px;font-family:var(--mono);font-size:12px;padding:8px 12px;border-radius:3px;display:none"></div>
        </div>
        <div class="modal-footer">
            <button class="btn-sm btn-ghost" onclick="closeModal('overlay-members')">Close</button>
            <button class="btn-sm btn-primary" onclick="addMembers()">Add</button>
        </div>
    </div>
</div>

<script>
    // ─── State ────────────────────────────────────────────────────────────────────
    const API = '';         // same origin
    let token = localStorage.getItem('chatbox_token') || '';
    let myUserId = null;
    let myInfo    = null;
    let conversations = [];
    let activeConvId  = null;
    let ws = null;
    let wsStatus = 'disconnected'; // connecting | connected | disconnected | error

    // ─── Auth Guard ───────────────────────────────────────────────────────────────
    if (!token) { window.location.href = 'auth.html'; }

    // ─── Helpers ─────────────────────────────────────────────────────────────────
    const authHeaders = () => ({
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
    });

    async function apiFetch(path, opts = {}) {
        if (!opts.headers) opts.headers = {};
        opts.headers['Authorization'] = 'Bearer ' + token;
        if (!opts.headers['Content-Type'] && opts.body) opts.headers['Content-Type'] = 'application/json';
        const res = await fetch(API + path, opts);
        if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
        return res;
    }

    function logout() {
        localStorage.removeItem('chatbox_token');
        window.location.href = 'auth.html';
    }

    function avatarColor(id) {
        const colors = ['#7c6af7','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444','#8b5cf6','#06b6d4'];
        return colors[id % colors.length];
    }

    function initials(firstname, lastname) {
        return ((firstname?.[0] || '') + (lastname?.[0] || '')).toUpperCase() || '?';
    }

    function formatTime(dt) {
        if (!dt) return '';
        const d = new Date(dt);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function statusIcon(status) {
        if (status === 'READ')      return '✓✓';
        if (status === 'DELIVERED') return '✓✓';
        if (status === 'SENT')      return '✓';
        return '';
    }

    // ─── WS Status Display ────────────────────────────────────────────────────────
    function setWsStatus(status) {
        wsStatus = status;
        const dot = document.getElementById('ws-dot-footer');
        dot.className = 'online-dot';
        if (status === 'connected')   { dot.style.background = 'var(--green)'; dot.style.boxShadow = '0 0 6px var(--green)'; }
        else if (status === 'connecting') { dot.style.background = 'var(--yellow)'; dot.style.boxShadow = 'none'; }
        else { dot.style.background = 'var(--muted)'; dot.style.boxShadow = 'none'; }
    }

    // ─── Load My Profile ─────────────────────────────────────────────────────────
    // We don't have a GET /api/me endpoint, so we decode the JWT subject (= phone number)
    // and store it. The user info appears in conversations as createdBy/sender objects.
    function decodeJwtPayload(token) {
        try {
            const b64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(atob(b64));
        } catch { return {}; }
    }

    const jwtPayload = decodeJwtPayload(token);
    const myNumber   = jwtPayload.sub || '';

    // ─── Conversations ────────────────────────────────────────────────────────────
    async function loadConversations() {
        try {
            const res = await apiFetch('/api/conversations/me');
            if (!res.ok) return;
            conversations = await res.json();

            // Try to get our userId from a conversation where we're createdBy
            if (!myUserId) {
                for (const c of conversations) {
                    if (c.createdBy && c.createdBy.number === myNumber) {
                        myUserId  = c.createdBy.id;
                        myInfo    = c.createdBy;
                        break;
                    }
                }
            }

            updateMeDisplay();
            renderConvList(conversations);
        } catch (e) {
            console.error('loadConversations', e);
        }
    }

    function updateMeDisplay() {
        if (myInfo) {
            document.getElementById('me-name').textContent = (myInfo.firstname || '') + ' ' + (myInfo.lastname || '');
            document.getElementById('me-number').textContent = myInfo.number || myNumber;
            document.getElementById('me-avatar').textContent = initials(myInfo.firstname, myInfo.lastname);
            document.getElementById('me-avatar').style.background =
                'linear-gradient(135deg, var(--accent), #a78bfa)';
        } else {
            document.getElementById('me-number').textContent = myNumber;
        }
    }

    function renderConvList(list) {
        const el = document.getElementById('conv-list');
        if (!list.length) {
            el.innerHTML = '<div style="padding:24px 16px; color:var(--muted); font-size:12px; font-family:var(--mono);">No conversations yet.<br/>Hit ＋ to start one.</div>';
            return;
        }

        el.innerHTML = list.map(c => {
            const name  = c.title || (c.isGroup ? 'Group Chat' : 'Direct Message');
            const icon  = c.isGroup ? '👥' : '💬';
            const color = avatarColor(c.id);
            const active = c.id === activeConvId ? ' active' : '';
            return `
      <div class="conv-item${active}" onclick="openConversation(${c.id})" id="conv-item-${c.id}">
        <div class="conv-avatar" style="background:${color}">${icon}</div>
        <div class="conv-info">
          <div class="conv-title">${escHtml(name)}</div>
          <div class="conv-meta">
            <span>${c.memberCount} member${c.memberCount !== 1 ? 's' : ''}</span>
            ${c.isGroup ? '<span class="badge">group</span>' : ''}
          </div>
        </div>
      </div>`;
        }).join('');
    }

    function filterConversations() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const filtered = conversations.filter(c =>
            (c.title || '').toLowerCase().includes(q) ||
            String(c.id).includes(q)
        );
        renderConvList(filtered);
    }

    // ─── Open Conversation ────────────────────────────────────────────────────────
    async function openConversation(convId) {
        activeConvId = convId;

        // Update sidebar active state
        document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
        const item = document.getElementById('conv-item-' + convId);
        if (item) item.classList.add('active');

        // Get detail
        const res = await apiFetch(`/api/conversations/${convId}`);
        if (!res.ok) return;
        const detail = await res.json();

        // Figure out my userId from members list if not known yet
        if (!myUserId) {
            const me = detail.members.find(m => m.number === myNumber);
            if (me) { myUserId = me.userId; myInfo = { id: me.userId, firstname: me.firstname, lastname: me.lastname, number: me.number }; updateMeDisplay(); }
        }

        const convName = detail.title || (detail.isGroup ? 'Group Chat' : 'Direct Message');

        // Build chat area
        const main = document.getElementById('main');
        main.innerHTML = `
    <div class="chat-area">
      <div class="chat-header">
        <div class="conv-avatar" style="background:${avatarColor(convId)};width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px">${detail.isGroup ? '👥' : '💬'}</div>
        <div>
          <div class="chat-title">${escHtml(convName)}</div>
          <div class="chat-subtitle" id="chat-subtitle">${detail.memberCount || detail.members.length} members</div>
        </div>
        <div class="chat-header-right">
          <div class="ws-status">
            <div class="ws-dot ${wsStatus === 'connected' ? 'connected' : wsStatus === 'connecting' ? 'connecting' : ''}" id="ws-dot-main"></div>
            <span id="ws-label">${wsStatus}</span>
          </div>
          <button class="icon-btn" onclick="openMembersModal(${convId})" title="Members">👤</button>
        </div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-bar">
        <div class="input-wrap">
          <textarea id="msg-input" placeholder="Type a message…" rows="1" onkeydown="handleMsgKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" onclick="sendMessage()" title="Send">➤</button>
      </div>
    </div>`;

        document.getElementById('empty-state')?.remove();

        // Load messages
        await loadMessages(convId);

        // Open conversation on WS
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'CONVERSATION_OPEN', conversationId: convId }));
        }

        // Focus input
        document.getElementById('msg-input')?.focus();
    }

    // ─── Messages ─────────────────────────────────────────────────────────────────
    async function loadMessages(convId) {
        const msgEl = document.getElementById('messages');
        if (!msgEl) return;

        // GET /api/messages?conversationId=X&page=0&size=40
        const res = await apiFetch(`/api/messages?conversationId=${convId}&page=0&size=40`);
        if (!res.ok) { msgEl.innerHTML = '<div style="color:var(--muted);text-align:center;font-size:12px;padding:20px">Failed to load messages.</div>'; return; }

        const page = await res.json();
        const msgs = [...(page.content || [])].reverse(); // oldest first

        if (!msgs.length) {
            msgEl.innerHTML = '<div style="color:var(--muted);text-align:center;font-size:12px;font-family:var(--mono);padding:20px">No messages yet. Say hello!</div>';
            return;
        }

        msgEl.innerHTML = msgs.map(m => renderMessage(m)).join('');
        msgEl.scrollTop = msgEl.scrollHeight;
    }

    function renderMessage(m) {
        const isMe = myUserId && (m.sender?.id === myUserId || m.senderId === myUserId);
        const cls  = isMe ? 'msg msg-out' : 'msg msg-in';
        const name = isMe ? 'You' : `${m.sender?.firstname || ''} ${m.sender?.lastname || ''}`.trim();
        const content = escHtml(m.content || '');
        const time    = formatTime(m.createdAt);
        const sIcon   = isMe ? statusIcon(m.status) : '';

        return `
    <div class="${cls}" id="msg-${m.id || m.clientMsgId || ''}">
      ${!isMe ? `<div class="msg-sender-name">${escHtml(name)}</div>` : ''}
      ${content}
      <div class="msg-meta">
        <span>${time}</span>
        ${sIcon ? `<span class="status-icon">${sIcon}</span>` : ''}
      </div>
    </div>`;
    }

    function appendMessage(m) {
        const msgEl = document.getElementById('messages');
        if (!msgEl) return;
        const atBottom = msgEl.scrollHeight - msgEl.clientHeight - msgEl.scrollTop < 60;
        msgEl.insertAdjacentHTML('beforeend', renderMessage(m));
        if (atBottom) msgEl.scrollTop = msgEl.scrollHeight;
    }

    // ─── Send Message ─────────────────────────────────────────────────────────────
    function sendMessage() {
        const input = document.getElementById('msg-input');
        if (!input) return;
        const content = input.value.trim();
        if (!content) return;
        if (activeConvId === null) return;

        const clientMsgId = 'c-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);

        if (ws && ws.readyState === WebSocket.OPEN) {
            // Send via WebSocket
            ws.send(JSON.stringify({
                type: 'MESSAGE_SEND',
                conversationId: activeConvId,
                content,
                clientMsgId
            }));
            // Optimistic UI
            appendMessage({
                id: null,
                clientMsgId,
                sender: myInfo || { id: myUserId },
                content,
                status: 'SENT',
                createdAt: new Date().toISOString()
            });
        } else {
            // Fallback: REST
            apiFetch('/api/messages', {
                method: 'POST',
                body: JSON.stringify({ conversationId: activeConvId, content, clientMsgId })
            }).then(async res => {
                if (res.ok) {
                    const m = await res.json();
                    appendMessage(m);
                }
            });
        }

        input.value = '';
        input.style.height = '';
    }

    function handleMsgKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 140) + 'px';
    }

    // ─── WebSocket ────────────────────────────────────────────────────────────────
    async function connectWs() {
        setWsStatus('connecting');
        updateWsDot('connecting');

        try {
            // Step 1: get a WS ticket
            const res = await apiFetch('/api/ws-ticket', { method: 'POST' });
            if (!res.ok) { setWsStatus('error'); updateWsDot('error'); return; }
            const { ticket } = await res.json();

            // Step 2: connect with ticket as query param
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            ws = new WebSocket(`${proto}://${location.host}/ws?ticket=${encodeURIComponent(ticket)}`);

            ws.onopen = () => {
                setWsStatus('connected');
                updateWsDot('connected');
                // If a conversation is already open, subscribe to it
                if (activeConvId !== null) {
                    ws.send(JSON.stringify({ type: 'CONVERSATION_OPEN', conversationId: activeConvId }));
                }
            };

            ws.onmessage = e => {
                let env;
                try { env = JSON.parse(e.data); } catch { return; }
                handleWsMessage(env);
            };

            ws.onerror = () => { setWsStatus('error'); updateWsDot('error'); };

            ws.onclose = () => {
                setWsStatus('disconnected');
                updateWsDot('disconnected');
                ws = null;
                // Reconnect after 3s
                setTimeout(connectWs, 3000);
            };

        } catch (err) {
            setWsStatus('error');
            updateWsDot('error');
            setTimeout(connectWs, 5000);
        }
    }

    function handleWsMessage(env) {
        switch (env.type) {
            case 'AUTH_OK':
                if (!myUserId && env.userId) {
                    myUserId = env.userId;
                    updateMeDisplay();
                }
                break;

            case 'MESSAGE_NEW': {
                const m = env.message;
                if (m && m.conversationId === activeConvId) {
                    appendMessage({
                        id: m.id,
                        clientMsgId: null,
                        sender: { id: m.senderId },
                        content: m.content,
                        status: m.status,
                        createdAt: m.createdAt
                    });
                    // Mark delivered
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'MESSAGE_DELIVERED', messageId: m.id }));
                    }
                }
                break;
            }

            case 'MESSAGE_ACK': {
                // Replace optimistic message with confirmed one
                const el = document.getElementById('msg-' + env.clientMsgId);
                if (el) el.id = 'msg-' + env.messageId;
                break;
            }

            case 'MESSAGE_STATUS_UPDATE': {
                // Update status icon if message is visible
                const el = document.getElementById('msg-' + env.messageId);
                if (el) {
                    const icon = el.querySelector('.status-icon');
                    if (icon) icon.textContent = statusIcon(env.status);
                }
                break;
            }

            case 'SERVER_ERROR':
                console.warn('WS error:', env.info);
                break;
        }
    }

    function updateWsDot(status) {
        const mainDot  = document.getElementById('ws-dot-main');
        const label    = document.getElementById('ws-label');
        if (mainDot) {
            mainDot.className = 'ws-dot';
            if (status === 'connected')    mainDot.classList.add('connected');
            else if (status === 'connecting') mainDot.classList.add('connecting');
            else if (status === 'error')   mainDot.classList.add('error');
        }
        if (label) label.textContent = status;
    }

    // ─── New Conversation Modal ───────────────────────────────────────────────────
    function openNewConvModal() {
        document.getElementById('overlay-newconv').classList.add('open');
        document.getElementById('nc-title').focus();
    }

    async function createConversation() {
        const title      = document.getElementById('nc-title').value.trim() || null;
        const isGroup    = document.getElementById('nc-isGroup').value === 'true';
        const rawIds     = document.getElementById('nc-members').value;
        const noticeEl   = document.getElementById('nc-notice');

        const memberUserIds = rawIds.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));

        hideNotice('nc-notice');

        try {
            const res = await apiFetch('/api/conversations', {
                method: 'POST',
                body: JSON.stringify({ title, isGroup, memberUserIds })
            });

            if (res.ok) {
                const conv = await res.json();
                showNotice('nc-notice', 'success', '✓ Created!');
                await loadConversations();
                setTimeout(() => {
                    closeModal('overlay-newconv');
                    openConversation(conv.id);
                }, 600);
            } else {
                const err = await res.json().catch(() => ({}));
                showNotice('nc-notice', 'error', err.message || 'Failed to create conversation.');
            }
        } catch (e) {
            showNotice('nc-notice', 'error', 'Network error.');
        }
    }

    // ─── Members Modal ────────────────────────────────────────────────────────────
    async function openMembersModal(convId) {
        document.getElementById('overlay-members').classList.add('open');
        hideNotice('members-notice');
        document.getElementById('add-member-ids').value = '';
        await loadMembersIntoModal(convId);
    }

    async function loadMembersIntoModal(convId) {
        const list = document.getElementById('members-list');
        list.innerHTML = '<div style="color:var(--muted);font-size:12px;font-family:var(--mono)">Loading…</div>';
        try {
            const res = await apiFetch(`/api/conversations/${convId}/members`);
            if (!res.ok) { list.innerHTML = '<div style="color:var(--red)">Failed to load</div>'; return; }
            const members = await res.json();

            list.innerHTML = members.map(m => `
      <div class="member-row" id="member-row-${m.userId}">
        <div class="member-avatar" style="background:${avatarColor(m.userId)}">${initials(m.firstname, m.lastname)}</div>
        <div class="member-info">
          <div class="member-name">${escHtml((m.firstname || '') + ' ' + (m.lastname || ''))}</div>
          <div class="member-role">${escHtml(m.number || '')}</div>
        </div>
        <span class="role-badge ${m.role === 'ADMIN' ? 'admin' : 'member'}">${m.role}</span>
        ${m.role !== 'ADMIN' ? `<button class="remove-btn" onclick="removeMember(${convId}, ${m.userId})" title="Remove">✕</button>` : ''}
      </div>`).join('');
        } catch (e) {
            list.innerHTML = '<div style="color:var(--red)">Error loading members.</div>';
        }
    }

    async function addMembers() {
        const raw = document.getElementById('add-member-ids').value;
        const userIds = raw.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
        if (!userIds.length) { showNotice('members-notice', 'error', 'Enter at least one user ID.'); return; }

        try {
            const res = await apiFetch(`/api/conversations/${activeConvId}/members`, {
                method: 'POST',
                body: JSON.stringify({ userIds })
            });
            if (res.ok) {
                showNotice('members-notice', 'success', '✓ Members added.');
                document.getElementById('add-member-ids').value = '';
                await loadMembersIntoModal(activeConvId);
                await loadConversations();
            } else {
                const err = await res.json().catch(() => ({}));
                showNotice('members-notice', 'error', err.message || 'Failed to add members.');
            }
        } catch (e) {
            showNotice('members-notice', 'error', 'Network error.');
        }
    }

    async function removeMember(convId, userId) {
        if (!confirm('Remove this member?')) return;
        try {
            const res = await apiFetch(`/api/conversations/${convId}/members/${userId}`, { method: 'DELETE' });
            if (res.ok || res.status === 204) {
                document.getElementById('member-row-' + userId)?.remove();
                await loadConversations();
            } else {
                alert('Could not remove member. You may not have ADMIN role.');
            }
        } catch (e) {
            alert('Network error.');
        }
    }

    // ─── Modal Helpers ────────────────────────────────────────────────────────────
    function openModal(id)  { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function showNotice(id, type, msg) {
        const el = document.getElementById(id);
        el.style.display = 'block';
        el.style.background   = type === 'success' ? 'rgba(74,222,128,.1)' : 'rgba(248,113,113,.1)';
        el.style.border       = type === 'success' ? '1px solid rgba(74,222,128,.3)' : '1px solid rgba(248,113,113,.3)';
        el.style.color        = type === 'success' ? 'var(--green)' : 'var(--red)';
        el.textContent = msg;
    }

    function hideNotice(id) {
        const el = document.getElementById(id);
        el.style.display = 'none';
        el.textContent = '';
    }

    // ─── XSS helper ──────────────────────────────────────────────────────────────
    function escHtml(s) {
        return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ─── Close modal on overlay click ────────────────────────────────────────────
    document.querySelectorAll('.overlay').forEach(el => {
        el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
    });

    // ─── Init ─────────────────────────────────────────────────────────────────────
    (async () => {
        await loadConversations();
        connectWs();
    })();
</script>
</body>
</html>
